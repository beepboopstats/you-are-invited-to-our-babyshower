<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- ============================================================
     CONTENT + THEME live in config.js — edit that file, not this one.
     The <title> and description below are fallbacks; config.js
     overrides them at load.
     ============================================================ -->
<title>Baby Shower</title>
<meta name="description" content="You're invited to our baby shower." />

<!-- Kept static (not config-driven) on purpose: the noindex tag is the privacy
     safeguard for the address and must not depend on JS running; the favicon
     shows the tab icon instantly. The injector below can override the favicon. -->
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍼</text></svg>" />

<script src="config.js"></script>

<!-- Build SEO / social-share metadata from config.js (title, description,
     canonical, Open Graph, Twitter Card, favicon). Runs in <head> so a
     JS-rendering crawler sees the tags in its snapshot. Note: non-rendering
     social scrapers won't run this — see config.js `meta`. -->
<script>
(function () {
  var C = window.CONFIG || {}, M = C.meta || {}, d = document, head = d.head;
  var abs = function (u) { try { return new URL(u, M.siteUrl || d.baseURI).href; } catch (e) { return u; } };
  function tag(sel, make) {
    var el = head.querySelector(sel);
    if (!el) { el = make(); head.appendChild(el); }
    return el;
  }
  function meta(key, attr, val) {
    if (val == null || val === "") return;
    tag("meta[" + attr + '="' + key + '"]', function () {
      var m = d.createElement("meta"); m.setAttribute(attr, key); return m;
    }).setAttribute("content", val);
  }
  // Title + description (single source; the bottom engine no longer sets these).
  if (C.title) d.title = C.title;
  meta("description", "name", C.description);
  // Canonical + Open Graph + Twitter Card.
  var url = M.siteUrl, img = M.shareImage ? abs(M.shareImage) : "";
  if (url) tag('link[rel="canonical"]', function () {
    var l = d.createElement("link"); l.rel = "canonical"; return l;
  }).setAttribute("href", url);
  meta("og:type", "property", "website");
  meta("og:title", "property", C.title);
  meta("og:description", "property", C.description);
  meta("og:url", "property", url);
  meta("og:image", "property", img);
  meta("og:image:alt", "property", M.shareImageAlt);
  meta("twitter:card", "name", "summary_large_image");
  meta("twitter:title", "name", C.title);
  meta("twitter:description", "name", C.description);
  meta("twitter:image", "name", img);
  // Favicon override (optional) — mirrors the static fallback above.
  if (M.favicon) {
    tag('link[rel="icon"]', function () { var l = d.createElement("link"); l.rel = "icon"; return l; })
      .setAttribute("href", "data:image/svg+xml," + encodeURIComponent(
        "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>" + M.favicon + "</text></svg>"));
  }
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />

<style>
  /* ============================================================
     THEME FALLBACKS — the real theme lives in config.js (the `theme`
     block). These values are only used for the split second before
     config.js applies, or if it fails to load. To change the look,
     edit config.js, NOT the values here.
     ============================================================ */
  :root {
    /* Palette */
    --bg:            #1d2b2a;   /* deep pine — page background        */
    --bg-2:         #24403c;   /* card / panel background            */
    --ink:          #f3ede1;   /* primary text (warm cream)          */
    --ink-soft:     #c3c9be;   /* secondary text                     */
    --accent:       #e8b04b;   /* honey gold — highlights, ring      */
    --accent-2:     #7fb09b;   /* sage — links, secondary accent     */
    --line:         rgba(243,237,225,0.16); /* hairline dividers      */

    /* Type */
    --font-display: "Fraunces", Georgia, serif;
    --font-body:    "Nunito Sans", system-ui, sans-serif;

    /* Shape & rhythm */
    --radius:       14px;
    --maxw:         680px;      /* content column width               */
    --gap:          clamp(1.75rem, 4vw, 3rem); /* space between sections */

    /* Hero background */
    --hero-bg: linear-gradient(rgba(29,43,42,0.55), rgba(29,43,42,0.82)), url("images/together.jpeg") center/cover no-repeat;

    /* Fill color behind the hero text (for legibility over a busy photo).
       transparent = no panel. Set theme.heroPanel in config.js to enable. */
    --hero-panel: transparent;
  }

  /* ---------- base ---------- */
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: clamp(1rem, 0.95rem + 0.3vw, 1.125rem);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  img { max-width: 100%; display: block; }
  a { color: var(--accent-2); }

  .wrap {
    max-width: var(--maxw);
    margin-inline: auto;
    padding-inline: clamp(1.25rem, 5vw, 2.5rem);
  }
  /* Full-bleed content column — lets the hero text use the whole width. */
  .wrap--wide { max-width: none; }

  /* section rhythm */
  section { padding-block: var(--gap); }
  .divider { height: 1px; background: var(--line); border: 0; margin: 0; }

  /* ---------- hero ---------- */
  .hero {
    background: var(--hero-bg);
    text-align: center;
    padding-block: clamp(2.5rem, 7vw, 4.5rem);
  }
  /* Optional fill panel behind the hero text — only visible when
     theme.heroPanel is set (the applier adds .hero-has-panel to <html>). */
  .hero__panel { border-radius: var(--radius); }
  .hero-has-panel .hero__panel {
    background: var(--hero-panel);
    padding: clamp(1.5rem, 5vw, 2.5rem);
  }
  .hero__title {
    font-family: var(--font-display);
    font-optical-sizing: auto;
    font-weight: 400;
    font-size: clamp(2.75rem, 8vw, 5rem);
    line-height: 0.98;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .hero__subtitle {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
    font-size: clamp(1.35rem, 4vw, 2rem);
    margin: 0.75rem 0 0;
  }
  .hero__body {
    color: var(--ink-soft);
    max-width: none;
    margin: 1.5rem auto 0;
  }

  /* ---------- event bar ---------- */
  .event {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: clamp(1.5rem, 5vw, 3rem);
  }

  /* countdown ring */
  .countdown {
    --size: 148px;
    flex: 0 0 auto;
    width: var(--size); height: var(--size);
    display: grid; place-items: center;
    border-radius: 50%;
    position: relative;
    background: var(--bg-2);
    box-shadow: inset 0 0 0 3px var(--accent);
  }
  .countdown::after {
    content: ""; position: absolute; inset: -9px;
    border-radius: 50%;
    border: 1px dashed var(--accent);
    opacity: 0.4;
  }
  .countdown__num {
    font-family: var(--font-display);
    font-size: 3.1rem; font-weight: 500; line-height: 1;
  }
  .countdown__label {
    text-transform: uppercase; letter-spacing: 0.18em;
    font-size: 0.7rem; color: var(--ink-soft); margin-top: 0.15rem;
  }

  .event__details { display: grid; gap: 0.35rem; justify-items: center; }
  .event__date {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    line-height: 1.05; margin: 0;
  }
  .event__location { color: var(--ink-soft); margin: 0 0 0.9rem; font-size: 1.05rem; }
  .event__actions {
    display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center;
  }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: var(--font-body); font-weight: 700;
    font-size: 0.95rem; letter-spacing: 0.01em;
    text-decoration: none; cursor: pointer;
    padding: 0.7rem 1.15rem;
    border-radius: var(--radius);
    border: 1px solid transparent;
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  .btn--solid { background: var(--accent); color: #241a06; }
  .btn--solid:hover { background: #f0bd63; }
  .btn--ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn--ghost:hover { border-color: var(--accent); }

  /* ---------- RSVP modal ---------- */
  .rsvp-dialog {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg-2);
    color: var(--ink);
    padding: 1.6rem;
    width: min(24rem, calc(100vw - 2rem));
    box-shadow: 0 18px 50px rgba(0,0,0,0.45);
  }
  .rsvp-dialog::backdrop { background: rgba(0,0,0,0.55); }
  .rsvp-dialog__title {
    font-family: var(--font-display); font-weight: 400;
    font-size: 1.8rem; margin: 0 0 1rem; text-align: center;
  }
  .rsvp-field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
  .rsvp-field > span { font-weight: 700; font-size: 0.9rem; }
  .rsvp-field input {
    font-family: var(--font-body); font-size: 1rem; color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 0.65rem 0.8rem;
  }
  .rsvp-field input:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
  .rsvp-form__msg { min-height: 1.2rem; margin: 0 0 0.75rem; font-size: 0.9rem; color: var(--ink-soft); }
  .rsvp-form__msg[data-state="error"] { color: #f0a9a0; }
  .rsvp-form__msg[data-state="ok"] { color: var(--accent-2); }
  .rsvp-form__actions { display: flex; justify-content: flex-end; gap: 0.6rem; }
  .rsvp-form__actions .btn[disabled] { opacity: 0.6; cursor: default; transform: none; }

  /* ---------- registry ---------- */
  .section-head {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    text-align: center; margin: 0 0 0.4rem;
  }
  .section-sub {
    text-align: center; color: var(--ink-soft);
    margin: 0 auto 2rem; max-width: 40ch;
  }
  .registry {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 0.9rem;
  }
  .registry__item {
    display: flex; flex-direction: column; gap: 0.15rem;
    text-decoration: none; color: var(--ink);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .registry__item:hover { transform: translateY(-3px); border-color: var(--accent-2); }
  .registry__item:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  .registry__name { font-family: var(--font-display); font-size: 1.35rem; }
  .registry__note { color: var(--ink-soft); font-size: 0.9rem; }
  .registry__arrow { margin-top: 0.35rem; color: var(--accent-2); font-weight: 700; font-size: 0.9rem; }

  /* ---------- footer ---------- */
  .footer { text-align: center; }
  .slideshow {
    position: relative;
    margin: 1.75rem 0;
  }
  .slideshow__track {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none; /* swipe/arrows are the controls; hide the bar */
  }
  .slideshow__track::-webkit-scrollbar { display: none; }
  .slideshow__track:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  .slideshow__track img {
    flex: 0 0 100%;
    width: 100%; aspect-ratio: 4/3; object-fit: cover;
    scroll-snap-align: start;
    scroll-snap-stop: always;
  }
  .slideshow__arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 2.5rem; height: 2.5rem;
    border: 1px solid var(--line); border-radius: 50%;
    background: var(--bg2);
    color: var(--ink); font-size: 1.4rem; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .slideshow__arrow:hover { border-color: var(--accent-2); }
  .slideshow__arrow:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  .slideshow__arrow--prev { left: 0.6rem; }
  .slideshow__arrow--next { right: 0.6rem; }
  .footer__note { color: var(--ink-soft); }
  .footer__sign {
    font-family: var(--font-display); font-style: italic;
    color: var(--accent); font-size: 1.4rem; margin-top: 0.5rem;
  }
  .credit { color: var(--ink-soft); font-size: 0.78rem; opacity: 0.6; padding-bottom: 2rem; text-align: center; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; scroll-behavior: auto !important; }
  }
</style>

<!-- Apply the theme from config.js as CSS variables. Runs in <head>,
     before the body paints, so there is no flash of the fallback colors.
     Maps each theme key to its CSS custom property. -->
<script>
(function () {
  var t = (window.CONFIG && window.CONFIG.theme) || {};
  var root = document.documentElement;
  var map = {
    bg: "--bg", bg2: "--bg-2", ink: "--ink", inkSoft: "--ink-soft",
    accent: "--accent", accent2: "--accent-2", line: "--line",
    fontDisplay: "--font-display", fontBody: "--font-body",
    radius: "--radius", maxWidth: "--maxw", gap: "--gap",
  };
  Object.keys(map).forEach(function (key) {
    if (t[key] != null && t[key] !== "") root.style.setProperty(map[key], t[key]);
  });
  // Hero background: explicit heroBg wins; otherwise build a dark-overlay
  // image from heroImage. If neither is set, the :root fallback stands.
  var hero = t.heroBg;
  if ((!hero || hero === "") && t.heroImage) {
    hero = 'linear-gradient(rgba(29,43,42,0.55), rgba(29,43,42,0.82)), url("' +
           t.heroImage + '") center/cover no-repeat';
  }
  if (hero) root.style.setProperty("--hero-bg", hero);

  // Optional fill panel behind the hero text (for legibility over a photo).
  if (t.heroPanel != null && t.heroPanel !== "") {
    root.style.setProperty("--hero-panel", t.heroPanel);
    root.classList.add("hero-has-panel");
  }
})();
</script>
</head>

<body>
  <!-- The page renders itself from the CONFIG object in config.js.
       In normal use you never touch the markup below — edit config.js only. -->

  <header class="hero">
    <div class="wrap wrap--wide">
      <div class="hero__panel">
        <h1 class="hero__title" data-bind="title"></h1>
        <p class="hero__subtitle" data-bind="subtitle"></p>
        <p class="hero__body" data-bind="body"></p>
      </div>
    </div>
  </header>

  <hr class="divider" />

  <section aria-label="Event details">
    <div class="wrap event">
      <div class="countdown" role="img" aria-label="Days remaining until the shower">
        <div>
          <div class="countdown__num" id="countdown-num">—</div>
          <div class="countdown__label" id="countdown-label">days to go</div>
        </div>
      </div>
      <div class="event__details">
        <p class="event__date" id="event-date"></p>
        <p class="event__date" id="event-time"></p>
        <p class="event__location" data-bind="location"></p>
        <div class="event__actions">
          <a class="btn btn--solid" id="calendar-btn" href="#" download>
            <span aria-hidden="true">📅</span> Add to calendar
          </a>
          <a class="btn btn--solid" id="rsvp-btn" target="_blank" rel="noopener noreferrer">
            <span aria-hidden="true">✉️</span> <span id="rsvp-label">RSVP</span>
          </a>
        </div>
      </div>
    </div>

    <!-- RSVP form modal (shown only when CONFIG.rsvpEndpoint is set). -->
    <dialog id="rsvp-dialog" class="rsvp-dialog" aria-labelledby="rsvp-dialog-title">
      <form id="rsvp-form" class="rsvp-form">
        <h2 class="rsvp-dialog__title" id="rsvp-dialog-title">RSVP</h2>
        <label class="rsvp-field">
          <span>Your name</span>
          <input id="rsvp-name" name="name" type="text" autocomplete="name"
                 maxlength="80" required />
        </label>
        <label class="rsvp-field">
          <span>Number attending</span>
          <input id="rsvp-count" name="count" type="number" inputmode="numeric"
                 min="1" max="20" step="1" value="1" required />
        </label>
        <p class="rsvp-form__msg" id="rsvp-msg" role="status" aria-live="polite"></p>
        <div class="rsvp-form__actions">
          <button type="button" class="btn btn--ghost" id="rsvp-cancel">Cancel</button>
          <button type="submit" class="btn btn--solid" id="rsvp-submit">Confirm RSVP</button>
        </div>
      </form>
    </dialog>
  </section>

  <hr class="divider" />

  <section aria-label="Baby registry">
    <div class="wrap">
      <h2 class="section-head" data-bind="registryHeading"></h2>
      <p class="section-sub" data-bind="registrySub"></p>
      <div class="registry" id="registry-grid"></div>
    </div>
  </section>

  <hr class="divider" />

  <footer class="footer">
    <div class="wrap">
      <h2 class="section-head" data-bind="footerHeading"></h2>
      <div class="slideshow" id="slideshow" aria-label="Photo slideshow" aria-roledescription="carousel">
        <div class="slideshow__track" id="slideshow-track" tabindex="0"></div>
        <button class="slideshow__arrow slideshow__arrow--prev" id="slideshow-prev" type="button" aria-label="Previous photo">&#8249;</button>
        <button class="slideshow__arrow slideshow__arrow--next" id="slideshow-next" type="button" aria-label="Next photo">&#8250;</button>
      </div>
      <p class="footer__note" data-bind="footerNote"></p>
      <p class="footer__sign" data-bind="footerSignoff"></p>
    </div>
  </footer>

  <p class="credit">Made with the one-page baby shower template.</p>

<script>
/* ================================================================
   ENGINE — you shouldn't need to edit below this line.
   Reads the CONFIG object defined in config.js and builds the page.
   ================================================================ */
(function () {
  const CONFIG = window.CONFIG || {};

  // 1. Fill every element that has a data-bind attribute.
  document.querySelectorAll("[data-bind]").forEach((el) => {
    const key = el.getAttribute("data-bind");
    if (CONFIG[key] != null && CONFIG[key] !== "") el.textContent = CONFIG[key];
  });

  // (Page <title>, description, and social/SEO tags are set by the metadata
  //  injector in <head>, so the engine no longer touches them here.)

  // 2. Countdown.
  const numEl = document.getElementById("countdown-num");
  const labelEl = document.getElementById("countdown-label");
  // Combine the date + start time into a local Date. eventDate is
  // "YYYY-MM-DD" and eventStart is 24-hour "HH:MM"; with no timezone suffix
  // this parses in the viewer's local zone (fine for the day count below).
  const start = new Date((CONFIG.eventDate || "") + "T" + (CONFIG.eventStart || "00:00"));
  if (!isNaN(start)) {
    // Count whole calendar days between "today" and the event in the
    // viewer's own timezone. eventStart has no timezone suffix, so it is
    // parsed as local time; normalizing both ends to local midnight makes
    // the result depend only on the date, not the time of day.
    const now = new Date();
    const startMidnight = new Date(start.getFullYear(), start.getMonth(), start.getDate());
    const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const msPerDay = 86400000;
    const days = Math.round((startMidnight - todayMidnight) / msPerDay);
    if (days > 1)      { numEl.textContent = days;  labelEl.textContent = "days to go"; }
    else if (days === 1) { numEl.textContent = "1"; labelEl.textContent = "day to go"; }
    else if (days === 0) { numEl.textContent = "🎉"; labelEl.textContent = "it's today"; }
    else                 { numEl.textContent = "♡";  labelEl.textContent = "thank you"; }
  }

  // 2a. Event date + start time — both derived from eventDate/eventStart and
  //     shown on their own lines, e.g. "Sep 5, 2026" then "2:00 pm".
  if (!isNaN(start)) {
    const dateEl = document.getElementById("event-date");
    if (dateEl) {
      dateEl.textContent = start.toLocaleDateString(undefined, {
        year: "numeric", month: "short", day: "numeric",
      });
    }
    const timeEl = document.getElementById("event-time");
    if (timeEl) {
      timeEl.textContent = start
        .toLocaleTimeString([], { hour: "numeric", minute: "2-digit", hour12: true })
        .toLowerCase();
    }
  }

  // 2b. RSVP button. Three modes, in priority order:
  //   (A) rsvpEndpoint set  -> button opens the on-page form; submissions POST
  //       to the Apps Script Web App, which appends a row to a Google Sheet.
  //   (B) rsvpUrl set       -> button is a plain link (web URL or mailto:).
  //   (C) neither set       -> button is removed.
  const rsvpBtn = document.getElementById("rsvp-btn");
  const rsvpEndpoint = (CONFIG.rsvpEndpoint || "").trim();
  const rsvpUrl = (CONFIG.rsvpUrl || "").trim();
  if (rsvpEndpoint || rsvpUrl) {
    document.getElementById("rsvp-label").textContent = CONFIG.rsvpLabel || "RSVP";
  }

  if (rsvpEndpoint) {
    // Mode A — open the form modal.
    const dialog = document.getElementById("rsvp-dialog");
    const form = document.getElementById("rsvp-form");
    const msg = document.getElementById("rsvp-msg");
    const submit = document.getElementById("rsvp-submit");
    const cancel = document.getElementById("rsvp-cancel");
    const setMsg = (text, state) => {
      msg.textContent = text || "";
      if (state) msg.setAttribute("data-state", state);
      else msg.removeAttribute("data-state");
    };

    // The button is an <a>; without an href it drops out of the tab order,
    // so restore keyboard access with role=button + tabindex + key handling.
    rsvpBtn.removeAttribute("href");
    rsvpBtn.removeAttribute("target");
    rsvpBtn.setAttribute("role", "button");
    rsvpBtn.setAttribute("tabindex", "0");
    const openDialog = () => {
      setMsg("");
      // <dialog> gives us focus-trapping, Esc-to-close, and a backdrop for free.
      if (typeof dialog.showModal === "function") dialog.showModal();
      else dialog.setAttribute("open", "");
    };
    rsvpBtn.addEventListener("click", (e) => { e.preventDefault(); openDialog(); });
    rsvpBtn.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openDialog(); }
    });
    cancel.addEventListener("click", () => dialog.close());

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = {
        name: form.elements.name.value.trim(),
        count: form.elements.count.value,
      };
      if (!payload.name) { setMsg("Please enter your name.", "error"); return; }

      submit.disabled = true;
      cancel.disabled = true;
      setMsg("Sending…");
      try {
        // Body is a plain string, so the browser sends Content-Type
        // text/plain — a "simple" request that skips the CORS preflight
        // Apps Script can't answer. mode:"no-cors" is used because Apps
        // Script redirects the POST to a URL without CORS headers, which
        // would make a successful write reject in the default "cors" mode.
        // The response is therefore opaque (we can't read it), so only
        // genuine network failures land in catch. The script reads
        // e.postData.contents to get this JSON.
        await fetch(rsvpEndpoint, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(payload),
        });
        setMsg(CONFIG.rsvpSuccess || "Thank you! Your RSVP is in.", "ok");
        form.reset();
        submit.textContent = "Done";
        setTimeout(() => dialog.close(), 1400);
      } catch (err) {
        setMsg("Sorry — that didn't go through. Please try again.", "error");
        submit.disabled = false;
        cancel.disabled = false;
      }
    });

    // Reset the form's UI each time the dialog closes.
    dialog.addEventListener("close", () => {
      submit.disabled = false;
      cancel.disabled = false;
      submit.textContent = "Confirm RSVP";
    });
  } else if (rsvpUrl) {
    // Mode B — plain link.
    rsvpBtn.href = rsvpUrl;
    // mailto links must open in the same tab, not a new one.
    if (rsvpUrl.startsWith("mailto:")) rsvpBtn.removeAttribute("target");
  } else {
    // Mode C — nothing configured.
    rsvpBtn.remove();
  }

  // 3. Registry grid.
  const grid = document.getElementById("registry-grid");
  (CONFIG.registries || []).forEach((r) => {
    const a = document.createElement("a");
    a.className = "registry__item";
    a.href = r.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.innerHTML =
      `<span class="registry__name"></span>` +
      `<span class="registry__note"></span>` +
      `<span class="registry__arrow">Open ↗</span>`;
    a.querySelector(".registry__name").textContent = r.name;
    a.querySelector(".registry__note").textContent = r.note || "";
    grid.appendChild(a);
  });

  // 4. Photo slideshow — one swipeable frame (scroll-snap does the swiping).
  // CONFIG.photos is either { folder: "..." } — the engine probes for
  // 01.*, 02.*, 03.*, … (jpeg/jpg/png/webp) and stops at the first gap —
  // or the legacy array of { src, alt } objects, which still works.
  const slideshow = document.getElementById("slideshow");
  const track = document.getElementById("slideshow-track");
  const slidePrev = document.getElementById("slideshow-prev");
  const slideNext = document.getElementById("slideshow-next");

  const addSlide = (src, alt) => {
    const img = document.createElement("img");
    img.src = src;
    img.alt = alt;
    track.appendChild(img);
  };

  // Called once all slides exist: removes the empty slideshow, or wires
  // the arrows/keyboard. Scrolls use the track's CSS scroll-behavior, so
  // the prefers-reduced-motion override still disables the animation.
  const finishSlideshow = (count) => {
    if (count === 0) { slideshow.remove(); return; }
    if (count === 1) { slidePrev.remove(); slideNext.remove(); return; }
    const step = (dir) => {
      const w = track.clientWidth;
      const max = track.scrollWidth - w;
      let x = Math.round(track.scrollLeft / w + dir) * w;
      if (x < 0) x = max;            // wrap around at either end
      else if (x > max + 1) x = 0;
      track.scrollTo({ left: x });
    };
    slidePrev.addEventListener("click", () => step(-1));
    slideNext.addEventListener("click", () => step(1));
    track.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") { e.preventDefault(); step(-1); }
      else if (e.key === "ArrowRight") { e.preventDefault(); step(1); }
    });
  };

  const photosCfg = CONFIG.photos;
  if (Array.isArray(photosCfg)) {
    photosCfg.forEach((p) => addSlide(p.src, p.alt || ""));
    finishSlideshow(photosCfg.length);
  } else if (photosCfg && photosCfg.folder) {
    const folder = photosCfg.folder.replace(/\/?$/, "/");
    const EXTS = ["jpeg", "jpg", "png", "webp"];
    // Resolves to the URL of photo #n (trying each extension) or null.
    // Uses an Image load as the existence test because fetch() is blocked
    // over file:// — this also pre-warms the browser cache for the slide.
    const probe = (n, e = 0) => new Promise((resolve) => {
      if (e >= EXTS.length) return resolve(null);
      const url = folder + String(n).padStart(2, "0") + "." + EXTS[e];
      const img = new Image();
      img.onload = () => resolve(url);
      img.onerror = () => probe(n, e + 1).then(resolve);
      img.src = url;
    });
    (async () => {
      let n = 1;
      for (let src; (src = await probe(n)); n++) addSlide(src, "Photo " + n);
      finishSlideshow(n - 1);
    })();
  } else {
    slideshow.remove();
  }

  // 5. "Add to calendar" — builds a downloadable .ics file on the fly.
  const esc = (s) => String(s || "").replace(/([,;\\])/g, "\\$1").replace(/\n/g, "\\n");
  // UTC stamp (with trailing Z) for DTSTAMP.
  const toUTC = (d) => new Date(d).toISOString().replace(/[-:]/g, "").replace(/\.\d{3}/, "");
  // Local date + time → the ical "YYYYMMDDTHHMMSS" form (no timezone suffix).
  const pad = (n, len = 2) => String(n == null ? "" : n).padStart(len, "0");
  const icsLocal = (dateStr, timeStr) => {
    const [y, mo, da] = (dateStr || "").split("-");
    const [h, mi] = (timeStr || "00:00").split(":");
    return pad(y, 4) + pad(mo) + pad(da) + "T" + pad(h) + pad(mi) + "00";
  };

  // Deduce the event's timezone from the US state code at the end of the
  // address (e.g. "…, Flagstaff, AZ" → "America/Phoenix"). Multi-zone states
  // use their most populous zone. Unknown/foreign → floating local time.
  const US_TZ = {
    AL:"America/Chicago", AK:"America/Anchorage", AZ:"America/Phoenix",
    AR:"America/Chicago", CA:"America/Los_Angeles", CO:"America/Denver",
    CT:"America/New_York", DE:"America/New_York", DC:"America/New_York",
    FL:"America/New_York", GA:"America/New_York", HI:"Pacific/Honolulu",
    ID:"America/Boise", IL:"America/Chicago", IN:"America/Indiana/Indianapolis",
    IA:"America/Chicago", KS:"America/Chicago", KY:"America/New_York",
    LA:"America/Chicago", ME:"America/New_York", MD:"America/New_York",
    MA:"America/New_York", MI:"America/Detroit", MN:"America/Chicago",
    MS:"America/Chicago", MO:"America/Chicago", MT:"America/Denver",
    NE:"America/Chicago", NV:"America/Los_Angeles", NH:"America/New_York",
    NJ:"America/New_York", NM:"America/Denver", NY:"America/New_York",
    NC:"America/New_York", ND:"America/Chicago", OH:"America/New_York",
    OK:"America/Chicago", OR:"America/Los_Angeles", PA:"America/New_York",
    RI:"America/New_York", SC:"America/New_York", SD:"America/Chicago",
    TN:"America/Chicago", TX:"America/Chicago", UT:"America/Denver",
    VT:"America/New_York", VA:"America/New_York", WA:"America/Los_Angeles",
    WV:"America/New_York", WI:"America/Chicago", WY:"America/Denver",
  };
  const addr = (CONFIG.location || "").trim();
  const stateMatch = addr.match(/\b([A-Za-z]{2})\b\s*(?:\d{5}(?:-\d{4})?)?\s*$/);
  const tzid = stateMatch ? US_TZ[stateMatch[1].toUpperCase()] : null;
  // With a known TZID, anchor the time to that zone; otherwise leave it
  // floating so it shows as the given wall-clock time in the guest's calendar.
  const dtParam = tzid ? ";TZID=" + tzid : "";
  const dtStart = icsLocal(CONFIG.eventDate, CONFIG.eventStart);
  const dtEnd = icsLocal(CONFIG.eventDate, CONFIG.eventEnd || CONFIG.eventStart);
  const calTitle = CONFIG.calendarTitle || CONFIG.title || "event";

  const ics = [
    "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//baby-shower-template//EN",
    "BEGIN:VEVENT",
    "UID:" + Date.now() + "@baby-shower",
    "DTSTAMP:" + toUTC(new Date()),
    "DTSTART" + dtParam + ":" + dtStart,
    "DTEND" + dtParam + ":" + dtEnd,
    "SUMMARY:" + esc(calTitle),
    "LOCATION:" + esc(CONFIG.location),
    "DESCRIPTION:" + esc(CONFIG.calendarDetails),
    "END:VEVENT", "END:VCALENDAR",
  ].join("\r\n");
  const blob = new Blob([ics], { type: "text/calendar" });
  const btn = document.getElementById("calendar-btn");
  btn.href = URL.createObjectURL(blob);
  btn.setAttribute("download", calTitle.replace(/\s+/g, "-").toLowerCase() + ".ics");
})();
</script>
</body>
</html>
